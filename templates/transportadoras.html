{% extends "base.html" %}

{% block content %}

<h1>Transportadoras</h1>

<h2>Nova Transportadora</h2>

<form method="Post">

    <label>Nome:</label><br>
    <input
        type="text"
        name="nome"
        required
    >

    <br><br>

    <button type="submit">
        Cadastrar
    </button>

</form>

<hr>

<h2>Transportadoras cadastradas</h2>

<table border="1">

    <tr>
        <th>Nome</th>
        <th>Ação</th>
    </tr>

    {% for transportadora in transportadoras %}

    <tr>

        <td>{{ transportadora[1] }}</td>
        <td>
            <a href="{{ url_for('editar_transportadoras', id=transportadora[0]) }}">
            Editar
            </a>
        
            <form
            action="{{ url_for('excluir_transportadora_rota', id=transportadora[0] )}}"
            method="POST"
            onsubmit="return confirm('Deseja realmente excluir esta transportadora?')"
        > 
                <button type="submit">
                Excluir
                </button>
            </form>
        </td>

    </tr>

    {% endfor %}

</table>

{% endblock %}
