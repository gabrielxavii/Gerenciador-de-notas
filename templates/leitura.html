{% extends "base.html" %}

{% block content %}

<h1>Leitura</h1>

<form method="POST">

    <label>Número da NF</label><br>

    <input
        type="text"
        name="numero_nf"
        required
    >

    <br><br>

    <label>Transportadora</label>

    <select
        name="transportadora_id"
        required
    >
        {% for transportadora in transportadoras %}

        <option value="{{ transportadora[0] }}">
            {{ transportadora[1] }}
        </option>
            
        {% endfor %}

    </select>

    <br><br>

    <button type="submit">
        Cadastrar
    </button>

</form>

<hr>

<h2>Notas cadastradas</h2>

<table border="1">

    <tr>
        <th>NF</th>
        <th>Transportadora</th>
        <th>Status</th>
        <th>Hora Pronta</th>
        <th>Ação</th>
    </tr>

    {% for nota in notas %}

    <tr>
        <td>{{ nota[1] }}</td>

        <td>{{ nota[2] }}</td>

        <td>{{ nota[3] }}</td>

        <td>{{ nota[4] }}</td>

    <td>
        {% if nota[3] == "Pendente" %}

        <form
            action="{{ url_for('marcar_pronta_rota', id=nota[0] )}}"
            method="POST"
        >

            <button type="submit">
                Marcar pronta
            </button>

        </form>

        {% else %}

        <form
            action="{{ url_for('voltar_pendente_rota', id=nota[0])}}"
            method="POST"
        >

            <button type="submit">
                Voltar para pendente
            </button>

        </form>

        {% endif %}

        </td>
    </tr>

    {% endfor %}

</table>
{% endblock %}
